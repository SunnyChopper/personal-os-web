name: Deploy Portfolio SPA (S3 + CloudFront)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main, master]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "bun.lock"
      - "package.json"
      - ".github/workflows/deploy-spa.yml"
    tags:
      - "deploy/dev"
      - "deploy/prod"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    if: |-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/tags/deploy/dev') ||
      (github.event_name == 'pull_request' &&
       github.repository == github.event.pull_request.head.repo.full_name &&
       contains(github.event.pull_request.labels.*.name, 'deploy-dev'))
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: bun install --frozen-lockfile --linker hoisted

      - name: Type check
        run: bun run --filter web type-check

      - name: Lint
        run: bun run --filter web lint

      - name: Build
        run: bun run --filter web build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_AWS_REGION: ${{ secrets.VITE_AWS_REGION }}
          VITE_AWS_USER_POOL_ID: ${{ secrets.VITE_AWS_USER_POOL_ID }}
          VITE_AWS_USER_POOL_WEB_CLIENT_ID: ${{ secrets.VITE_AWS_USER_POOL_WEB_CLIENT_ID }}
          VITE_AWS_IDENTITY_POOL_ID: ${{ secrets.VITE_AWS_IDENTITY_POOL_ID }}

      - name: Require AWS_DEPLOY_ROLE_ARN for OIDC
        env:
          ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ROLE_ARN}" ]]; then
            echo "::error::AWS_DEPLOY_ROLE_ARN missing in GitHub Environment **dev**. Set Terraform output github_deploy_role_arn (edge stack) — see personal-os-web/CLAUDE.md."
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy SPA via shared script (--no-build; build step above)
        env:
          SPA_BUCKET: ${{ secrets.SPA_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          AWS_REGION: us-east-1
        run: node scripts/deploy-spa.mjs dev --no-build

      - uses: actions/upload-artifact@v4
        with:
          name: web-spa-dist-dev
          path: apps/web/dist
          if-no-files-found: error

  deploy-prod:
    if: |-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'push' && github.ref == 'refs/tags/deploy/prod')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: bun install --frozen-lockfile --linker hoisted

      - name: Type check
        run: bun run --filter web type-check

      - name: Lint
        run: bun run --filter web lint

      - name: Build
        run: bun run --filter web build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_AWS_REGION: ${{ secrets.VITE_AWS_REGION }}
          VITE_AWS_USER_POOL_ID: ${{ secrets.VITE_AWS_USER_POOL_ID }}
          VITE_AWS_USER_POOL_WEB_CLIENT_ID: ${{ secrets.VITE_AWS_USER_POOL_WEB_CLIENT_ID }}
          VITE_AWS_IDENTITY_POOL_ID: ${{ secrets.VITE_AWS_IDENTITY_POOL_ID }}

      - name: Require AWS_DEPLOY_ROLE_ARN for OIDC
        env:
          ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ROLE_ARN}" ]]; then
            echo "::error::AWS_DEPLOY_ROLE_ARN missing in GitHub Environment **prod**. Set Terraform output github_deploy_role_arn (edge stack) — see personal-os-web/CLAUDE.md."
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy SPA via shared script (--no-build; build step above)
        env:
          SPA_BUCKET: ${{ secrets.SPA_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          AWS_REGION: us-east-1
        run: node scripts/deploy-spa.mjs prod --no-build

      - uses: actions/upload-artifact@v4
        with:
          name: web-spa-dist-prod
          path: apps/web/dist
          if-no-files-found: error
